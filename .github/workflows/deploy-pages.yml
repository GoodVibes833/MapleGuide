name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Run tests
        run: npm test

      - name: Build static site
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          MAPLEGUIDE_GA_MEASUREMENT_ID: ${{ vars.MAPLEGUIDE_GA_MEASUREMENT_ID }}
        run: npm run fetch -- --base-path "$PAGES_BASE_PATH"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
